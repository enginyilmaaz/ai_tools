name: Build and Release

on:
  push:
    branches:
      - dev
      - main
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "SemVer tag (example: v1.2.3)"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      safe_version: ${{ steps.meta.outputs.safe_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      latest: ${{ steps.meta.outputs.latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          derive_next_stable_version() {
            git fetch --tags --force
            local latest_tag latest_version major minor patch candidate
            latest_tag="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)"
            if [[ -n "$latest_tag" ]]; then
              latest_version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "$latest_version"
              patch=$((patch + 1))
            else
              major=1; minor=0; patch=1
            fi
            candidate="${major}.${minor}.${patch}"
            while version_exists "$candidate"; do
              patch=$((patch + 1))
              candidate="${major}.${minor}.${patch}"
            done
            echo "$candidate"
          }

          version_exists() {
            local version="$1" tag="v${version}"
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then return 0; fi
            if gh release view "$tag" >/dev/null 2>&1; then return 0; fi
            return 1
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"; VERSION="${TAG#v}"
            if [[ "$VERSION" == *-* ]]; then PRERELEASE="true"; LATEST="false"; else PRERELEASE="false"; LATEST="true"; fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="$REF_NAME"; VERSION="${TAG#v}"
            if [[ "$VERSION" == *-* ]]; then PRERELEASE="true"; LATEST="false"; else PRERELEASE="false"; LATEST="true"; fi
          else
            BASE_VERSION="$(derive_next_stable_version)"
            if [[ "$REF_NAME" == "dev" ]]; then
              VERSION="${BASE_VERSION}-dev.${RUN_NUMBER}"; TAG="v${VERSION}"; PRERELEASE="true"; LATEST="false"
            elif [[ "$REF_NAME" == "main" || "$REF_NAME" == "master" ]]; then
              VERSION="${BASE_VERSION}"; TAG="v${VERSION}"; PRERELEASE="false"; LATEST="true"
            else
              echo "Unsupported branch: ${REF_NAME}"; exit 1
            fi
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver"; exit 1
          fi

          SAFE_VERSION="${VERSION//+/-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-deb
            build_command: yarn build:linux --publish never
            source_glob: "*.deb"
          - os: ubuntu-latest
            platform: linux-appimage
            build_command: yarn build:standalone --publish never
            source_glob: "*.AppImage"
          - os: windows-latest
            platform: windows
            build_command: yarn build:win --publish never
            source_glob: "*Setup*.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        shell: bash
        env:
          TOKEN: ${{ secrets.SKILLS_REPO_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set app version from release tag
        run: npm version "${{ needs.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build package
        shell: bash
        run: ${{ matrix.build_command }}

      - name: Rename release assets
        id: package
        shell: bash
        env:
          SAFE_VERSION: ${{ needs.meta.outputs.safe_version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          SOURCE_FILE="$(find out -type f -name "${{ matrix.source_glob }}" | head -n 1)"
          if [[ -z "${SOURCE_FILE}" ]]; then
            echo "Build output not found for pattern: ${{ matrix.source_glob }}"; exit 1
          fi
          mkdir -p dist
          EXT="${SOURCE_FILE##*.}"
          APP_SLUG="ai-tool"
          TARGET_NAME="${APP_SLUG}_v${SAFE_VERSION}_${PLATFORM}.${EXT}"
          cp "$SOURCE_FILE" "dist/$TARGET_NAME"
          echo "Prepared asset: dist/$TARGET_NAME"

          # Windows: also pick up the portable exe
          if [[ "$PLATFORM" == "windows" ]]; then
            PORTABLE="$(find out -type f -name "*.exe" ! -name "*Setup*" ! -name "*uninstall*" ! -name "*blockmap*" ! -path "*/win-unpacked/*" ! -path "*__*" | head -n 1)"
            if [[ -n "$PORTABLE" ]]; then
              cp "$PORTABLE" "dist/${APP_SLUG}_v${SAFE_VERSION}_portable.exe"
              echo "Prepared portable asset: dist/${APP_SLUG}_v${SAFE_VERSION}_portable.exe"
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-asset
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - meta
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.meta.outputs.prerelease }}
          IS_LATEST: ${{ needs.meta.outputs.latest }}
        run: |
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            ARGS=(--title "$TAG" --notes "Automated release for $TAG")
            if [[ "$PRERELEASE" == "true" ]]; then ARGS+=(--prerelease); fi
            if [[ "$IS_LATEST" == "true" ]]; then ARGS+=(--latest); fi
            gh release create "$TAG" --repo "$REPO" "${ARGS[@]}"
          fi

      - name: Delete old assets from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING="$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name' 2>/dev/null || true)"
          for ASSET in $EXISTING; do
            echo "Deleting old asset: $ASSET"
            gh release delete-asset "$TAG" "$ASSET" --repo "$REPO" --yes 2>/dev/null || true
          done

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          mapfile -t FILES < <(find dist -type f)
          if [[ ${#FILES[@]} -eq 0 ]]; then echo "No artifacts"; exit 1; fi
          gh release upload "$TAG" "${FILES[@]}" --clobber --repo "$REPO"
